spring.application.name=tsetmc-api
# Server
server.port=9000
server.servlet.context-path=/tsetmc
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Cache
cache.enabled=true
cache.default-ttl-ms=3600000
cache.key-prefix=tsetmc-api:
# Cache names
cache.names.market-overview=tsetmc-market-overview
cache.names.selected-indexes=tsetmc-selected-indexes
cache.names.instrument-effects=tsetmc-instrument-effects
cache.names.most-visited=tsetmc-most-visited
cache.names.closing-price=tsetmc-closing-price
cache.names.best-limits=tsetmc-best-limits
cache.names.client-type=tsetmc-client-type
cache.names.closing-price-daily=tsetmc-closing-price-daily
cache.names.closing-price-chart=tsetmc-closing-price-chart
cache.names.instrument-info=tsetmc-instrument-info
cache.names.related-companies=tsetmc-related-companies
cache.names.codal-by-instrument=tsetmc-codal-by-instrument
cache.names.codal-latest=tsetmc-codal-latest
cache.names.market-messages-by-flow=tsetmc-market-messages-by-flow
cache.names.instrument-state-top=tsetmc-instrument-state-top
cache.names.trades=tsetmc-trades
cache.names.market-messages-by-instrument=tsetmc-market-messages-by-instrument
cache.names.etf-info=tsetmc-etf-info
cache.names.codal-statement-content=tsetmc-codal-statement-content
# Cache TTLs are backend-owned. They are intentionally independent from UI timing.
cache.ttls.market-overview-ms=${CACHE_TTL_MARKET_OVERVIEW_MS:3000}
cache.ttls.closing-price-ms=${CACHE_TTL_CLOSING_PRICE_MS:3000}
cache.ttls.instrument-info-ms=${CACHE_TTL_INSTRUMENT_INFO_MS:3600000}
cache.ttls.best-limits-ms=${CACHE_TTL_BEST_LIMITS_MS:3000}
cache.ttls.client-type-ms=${CACHE_TTL_CLIENT_TYPE_MS:3000}
cache.ttls.closing-price-chart-ms=${CACHE_TTL_CLOSING_PRICE_CHART_MS:86400000}
cache.ttls.related-companies-ms=${CACHE_TTL_RELATED_COMPANIES_MS:3600000}
cache.ttls.etf-info-ms=${CACHE_TTL_ETF_INFO_MS:3000}
# Cache TTLs (ms) - endpoints not polled by the UI
cache.ttls.selected-indexes-ms=3600000
cache.ttls.instrument-effects-ms=3600000
cache.ttls.most-visited-ms=3600000
cache.ttls.closing-price-daily-ms=3600000
cache.ttls.codal-by-instrument-ms=3600000
cache.ttls.codal-latest-ms=3600000
cache.ttls.market-messages-by-flow-ms=3600000
cache.ttls.instrument-state-top-ms=3600000
cache.ttls.trades-ms=3600000
cache.ttls.market-messages-by-instrument-ms=3600000
cache.ttls.codal-statement-content-ms=3600000
# =========================
# External APIs
# =========================
external.tsetmc.base-url=https://cdn.tsetmc.com/api
external.tsetmc.connect-timeout-ms=10000
external.tsetmc.read-timeout-ms=15000
external.tsetmc.retry-attempts=${TSETMC_RETRY_ATTEMPTS:1}
external.tsetmc.retry-delay-ms=${TSETMC_RETRY_DELAY_MS:500}
# =========================
# Logging
# =========================
logging.level.com.ernoxin=INFO
# =========================
# Graceful Shutdown
# =========================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.jmx.enabled=false
# =========================
# Virtual Threads (Java 21 / Project Loom)
# =========================
spring.threads.virtual.enabled=true
# =========================
# Tomcat Tuning
# =========================
server.tomcat.max-connections=80
server.tomcat.accept-count=20
server.tomcat.threads.max=25
server.tomcat.threads.min-spare=2
server.tomcat.connection-timeout=5s
# =========================
# Redis Connection Pool (requires commons-pool2)
# =========================
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=6
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=2s
spring.data.redis.connect-timeout=2s
spring.data.redis.timeout=3s
